name: Publicar no GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'frontend/public/data.json'   # Atualiza quando os dados mudam
      - 'frontend/src/**'             # Atualiza quando o código muda
      - 'frontend/public/**'

  workflow_dispatch: # Permite rodar manualmente pelo GitHub

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependências do frontend
        run: npm --prefix frontend install

      - name: Build estático (modo leitura)
        run: npm --prefix frontend run build:static

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload artefato
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

      - name: Deploy para GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
